services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: db1
    container_name: db
    ports:
      - 5432:5432
    networks:
    - common-net

  auth: 
    image: main-image
    build:
      context:    ./docker
      dockerfile: main-image
    entrypoint: bin/sso
    volumes:
      - "./:/app:ro"
    working_dir: /app
    container_name: auth
    depends_on:
      - db
    ports:
     - 10000:10000
    networks:
    - common-net

  shop: 
    image: main-image
    build:
      context:    ./docker
      dockerfile: main-image
    entrypoint: bin/shop
    volumes:
      - "./:/app:ro"
    working_dir: /app
    container_name: shop
    ports:
     - 10001:10001
    networks:
      - common-net

  test: 
    image: main-image
    build:
      context:    ./docker
      dockerfile: main-image
    entrypoint:  bash -c "go generate ./tests/... && go test ./..."
    volumes:
      - "./:/app:ro"
    working_dir: /app
    depends_on:
      - db
    networks:
    - common-net
    profiles: [test]

networks:
  common-net: {}